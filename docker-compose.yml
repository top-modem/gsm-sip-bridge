services:
  gsm-sip-bridge:
    build: .
    container_name: gsm-sip-bridge
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - ./config.ini:/etc/gsm-sip-bridge/config.ini:ro
      - sms-data:/var/lib/gsm-sip-bridge
      - /dev/snd:/dev/snd
      - /dev/bus/usb:/dev/bus/usb
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/ttyUSB2:/dev/ttyUSB2
      - /dev/ttyUSB3:/dev/ttyUSB3
    group_add:
      - audio
      - dialout

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: gsm-bridge-prometheus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.listen-address=:9090"

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: gsm-bridge-grafana
    restart: unless-stopped
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_HTTP_PORT=3000
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  sms-data:
  prometheus-data:
  grafana-data:
