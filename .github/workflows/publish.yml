name: Publish Docker Image

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PJSIP_VERSION: "2.16"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=pjsip-${{ env.PJSIP_VERSION }}
            type=gha,scope=build-main
            type=gha,scope=build-${{ github.ref_name }}
          cache-to: |
            type=gha,scope=pjsip-${{ env.PJSIP_VERSION }},mode=max
            type=gha,scope=build-${{ github.ref_name }},mode=max

      - name: Read release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ -f RELEASE_NOTES.md ]; then
            SECTION=$(awk "/^## v${TAG}\$/,/^## v/" RELEASE_NOTES.md | sed '$ { /^## v/d }' | sed '1d')
            if [ -n "$SECTION" ]; then
              {
                echo 'NOTES<<RELEASE_EOF'
                echo '## What'\''s New'
                echo "$SECTION"
                echo 'RELEASE_EOF'
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo 'NOTES<<RELEASE_EOF'
                echo '## What'\''s New'
                echo ''
                echo "See [Full Changelog](https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}) for details."
                echo ''
                echo 'RELEASE_EOF'
              } >> "$GITHUB_OUTPUT"
            fi
          else
            {
              echo 'NOTES<<RELEASE_EOF'
              echo '## What'\''s New'
              echo ''
              echo "See [Full Changelog](https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}) for details."
              echo ''
              echo 'RELEASE_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ${{ steps.release_notes.outputs.NOTES }}
            ## Docker Image

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            **Platforms:** linux/amd64, linux/arm64

            **Tags published:**
            ${{ steps.meta.outputs.tags }}
