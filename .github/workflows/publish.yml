name: Publish Docker Image

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-latest-arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest-amd64: ${{ steps.build.outputs.digest }}
      image-digest-arm64: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Platform pair slug
        id: platform
        run: echo "slug=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Build and push single-platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ steps.platform.outputs.slug }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ steps.platform.outputs.slug }}
          cache-to: type=gha,scope=build-${{ steps.platform.outputs.slug }},mode=max

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Create multi-arch manifest
        run: |
          TAGS=(${{ steps.meta.outputs.tags }})
          SOURCE_AMD64="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-linux-amd64"
          SOURCE_ARM64="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-linux-arm64"

          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "$TAG" "$SOURCE_AMD64" "$SOURCE_ARM64"
          done

      - name: Read release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ -f RELEASE_NOTES.md ]; then
            SECTION=$(awk "found && /^## v/{exit} /^## v${TAG}\$/{found=1; next} found{print}" RELEASE_NOTES.md)
            if [ -n "$SECTION" ]; then
              {
                echo 'NOTES<<RELEASE_EOF'
                echo '## What'\''s New'
                echo "$SECTION"
                echo 'RELEASE_EOF'
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo 'NOTES<<RELEASE_EOF'
                echo '## What'\''s New'
                echo ''
                echo "See [Full Changelog](https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}) for details."
                echo ''
                echo 'RELEASE_EOF'
              } >> "$GITHUB_OUTPUT"
            fi
          else
            {
              echo 'NOTES<<RELEASE_EOF'
              echo '## What'\''s New'
              echo ''
              echo "See [Full Changelog](https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}) for details."
              echo ''
              echo 'RELEASE_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ${{ steps.release_notes.outputs.NOTES }}
            ## Docker Image

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            **Platforms:** linux/amd64, linux/arm64

            **Tags published:**
            ${{ steps.meta.outputs.tags }}

      - name: Clean up platform-specific tags
        run: |
          for PLATFORM in linux-amd64 linux-arm64; do
            TAG="${{ github.ref_name }}-${PLATFORM}"
            docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" > /dev/null 2>&1 || continue
            echo "Platform tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} left as intermediate artifact"
          done
