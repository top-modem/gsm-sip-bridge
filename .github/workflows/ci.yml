name: CI

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

env:
  PJSIP_VERSION: "2.16"
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libclang-dev \
            libasound2-dev libssl-dev libusb-1.0-0-dev libudev-dev socat wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache PJSIP build
        id: pjsip-cache
        uses: actions/cache@v4
        with:
          path: /usr/local
          key: pjsip-${{ env.PJSIP_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Build and install PJSIP
        if: steps.pjsip-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/pjsip/pjproject/archive/refs/tags/${PJSIP_VERSION}.tar.gz
          tar xzf ${PJSIP_VERSION}.tar.gz
          cd pjproject-${PJSIP_VERSION}
          ./configure --prefix=/usr/local \
            --enable-shared \
            --disable-video \
            --disable-v4l2 \
            --with-external-pa=no
          make -j$(nproc) dep
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Refresh linker cache
        if: steps.pjsip-cache.outputs.cache-hit == 'true'
        run: sudo ldconfig

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Check unsafe blocks have SAFETY comments
        run: |
          violations=$(grep -rn "^\s*unsafe\b" pjsua-safe/src/ 2>/dev/null \
            | grep -v "// SAFETY:" \
            | grep -v "#\[cfg" \
            | grep -v "cfg(feature" || true)
          if [ -n "$violations" ]; then
            echo "::error::unsafe blocks without // SAFETY: comment found:"
            echo "$violations"
            exit 1
          fi

      - name: Verify Docker build context
        run: |
          if ! docker compose -f docker/docker-compose.yml config --quiet 2>/dev/null; then
            echo "::warning::docker-compose.yml validation skipped (docker compose not available)"
          fi
