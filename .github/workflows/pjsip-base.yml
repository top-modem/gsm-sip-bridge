name: Build PJSIP Base Image

on:
  workflow_dispatch:
    inputs:
      pjsip_version:
        description: "PJSIP version to build"
        required: true
        default: "2.16"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/pjsip

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform PJSIP base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/pjsip.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.pjsip_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            PJSIP_VERSION=${{ inputs.pjsip_version }}
          cache-from: type=gha,scope=pjsip-base
          cache-to: type=gha,scope=pjsip-base,mode=max
